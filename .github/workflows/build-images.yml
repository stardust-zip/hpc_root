name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docker-compose.yml"
      - "local_deploy.sh"
      - "test_script.sh"
      - "README.md"
      - ".gitignore"
      - "docs/**"
      - "docs"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: system-management
            context: ./System-Management
            image_name: hpc-system-management
          - service: fe-portal
            context: ./fe-portal
            image_name: hpc-fe-portal
          - service: lms
            context: ./LMS
            image_name: hpc-lms
          - service: tuyen-dung
            context: ./Module_Tuyendung/back-end
            image_name: hpc-tuyen-dung
          - service: dispatch
            context: ./hpc_dispatch_management
            image_name: hpc-dispatch
          - service: drive
            context: ./hpc_drive
            image_name: hpc-drive

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Frontend Env File
        run: |
          cat << EOF > ./fe-portal/.env.production
          NEXT_PUBLIC_API_URL=http://hethongdientu.khoacongnghethongtinhpc.io.vn:8082/api
          NEXT_PUBLIC_DRIVE_API_URL=http://hethongdientu.khoacongnghethongtinhpc.io.vn:7777/api/v1
          NEXT_PUBLIC_DISPATCH_API_URL=http://hethongdientu.khoacongnghethongtinhpc.io.vn:8888
          NEXT_PUBLIC_TUYENDUNG_API_URL=http://hethongdientu.khoacongnghethongtinhpc.io.vn:8020
          NEXT_PUBLIC_LMS_API_URL=http://hethongdientu.khoacongnghethongtinhpc.io.vn:8083/api
          NEXT_PUBLIC_REVERB_HOST=hethongdientu.khoacongnghethongtinhpc.io.vn
          NEXT_PUBLIC_REVERB_PORT=8082
          NEXT_PUBLIC_REVERB_SCHEME=https
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-to-server:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            # --- CONFIGURATION ---
            DOCKER_COMPOSE=~/docker-compose
            PROJECT_PATH=/home/admin.hethongdientu/project_v1/hpc_root

            # --- 1. UPDATE CODE ---
            cd $PROJECT_PATH
            git fetch origin main
            git reset --hard origin/main
            git submodule update --init --recursive

            # --- 2. RESTART CONTAINERS ---
            $DOCKER_COMPOSE -f docker-compose.prod.yml pull
            $DOCKER_COMPOSE -f docker-compose.prod.yml down

            echo "🔧 Pre-creating upload directories on the host..."
            mkdir -p LMS/uploads LMS/logs
            mkdir -p System-Management/storage/app/public System-Management/storage/logs
            mkdir -p Module_Tuyendung/back-end/storage/app/public Module_Tuyendung/back-end/public/cvs

            chmod -R 777 LMS/uploads LMS/logs System-Management/storage Module_Tuyendung/back-end/storage Module_Tuyendung/back-end/public/cvs

            $DOCKER_COMPOSE -f docker-compose.prod.yml up -d

            echo "⏳ Waiting 20s for Database to initialize..."
            sleep 20

            # --- 2.5 FORCE DATABASE CREATION ---
            # Fixes the Python containers crashing because init.sql is ignored on existing volumes
            echo "🔧 Ensuring all databases exist..."
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T shared_db mysql -u root -p"$DB_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS system_services; CREATE DATABASE IF NOT EXISTS module_tuyendung; CREATE DATABASE IF NOT EXISTS LMS; CREATE DATABASE IF NOT EXISTS hpc_drive; CREATE DATABASE IF NOT EXISTS hpc_dispatch;"

            # Restart Python services so they connect to the newly created databases
            $DOCKER_COMPOSE -f docker-compose.prod.yml restart dispatch_service hpc_drive
            sleep 5

            # --- 3. SYSTEM MANAGEMENT SETUP ---
            echo "🔧 Setting up System Management..."



            # A. Create ALL required folders
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache storage/logs storage/app/public

            # B. Fix Ownership & Permissions
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -u 0 sys_app chown -R www-data:www-data storage bootstrap/cache
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -u 0 sys_app chmod -R 777 storage bootstrap/cache



            # C. Composer & Cache Clear
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app composer install --no-interaction --prefer-dist
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app composer dump-autoload -o
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app php artisan optimize:clear

            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app php artisan storage:link || true

            # D. Migrate (Single run handles core + modules without duplicate table errors)
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app php artisan migrate --path=database/migrations --force
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app php artisan migrate --path=Modules/Task/database/migrations --force
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T sys_app php artisan db:seed --class=AdminSeeder --force

            # --- 4. RECRUITMENT MODULE SETUP ---
            echo "🔧 Setting up Recruitment Module..."

            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -u 0 tuyen_app sh -c 'if command -v apt-get >/dev/null; then apt-get update && apt-get install -y zip unzip git; elif command -v apk >/dev/null; then apk add --no-cache zip unzip git; fi'

            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T tuyen_app mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache public/cvs storage/app/public
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -u 0 tuyen_app chmod -R 777 storage bootstrap/cache || true

            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -u 0 tuyen_app chown -R www-data:www-data public/cvs
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -u 0 tuyen_app chmod -R 775 public/cvs

            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T tuyen_app composer install --no-interaction --prefer-dist

            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T tuyen_app php artisan storage:link || true

            # Migrate and Seed Tuyen Module
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T tuyen_app php artisan migrate --force
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T tuyen_app php artisan db:seed --class=TeachersSeeder --force
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T tuyen_app php artisan db:seed --class=StudentSeeder --force

            # --- 5. DISPATCH MODULE SETUP ---
            echo "🔧 Seeding Dispatch Service..."
            $DOCKER_COMPOSE -f docker-compose.prod.yml exec -T -w /app/src dispatch_service python -m hpc_dispatch_management.seed

            # 6. Clean up old project images
            echo "Cleaning dangling images for pandora08/hpc-*"
            docker images "pandora08/hpc-*" -f "dangling=true" -q | xargs -r docker rmi || true

            echo "✅ Deployment Complete!"
